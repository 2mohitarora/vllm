apiVersion: v1
kind: Pod
metadata:
  name: dra-test-pod
spec:
  resourceClaims:
    - name: nvidia-gpu
      resourceClaimTemplateName: nvidia-gpu-claim-template
  containers:
    - name: test
      image: busybox
      command: ["echo", "DRA claim worked"]
      resources:
        claims:
          - name: nvidia-gpu
  restartPolicy: Never
