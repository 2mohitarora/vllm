# This creates a Deployment that runs 1 replicas of the inference simulator. Each pod pretends to be a vLLM server serving a model called simulator. They expose /v1/chat/completions, /v1/models, /health, and /metrics exactly like real vLLM would.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-sim
  namespace: llm-d
  labels:
    app: llm-d-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-sim
  template:
    metadata:
      labels:
        app: llm-d-sim
    spec:
      #resourceClaims:
      #  - name: gpu
      #    resourceClaimTemplateName: gpu-claim-template
      containers:
        - name: sim
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.0
          args:
            - "--model"
            - "base-model"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
            #claims:
            #  - name: gpu
