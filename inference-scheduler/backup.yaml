apiVersion: v1
kind: Service
metadata:
  name: llm-d-sim-svc
spec:
  selector:
    app: llm-d-sim
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sim-route
spec:
  parentRefs:
    - name: inference-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: llm-d-sim-svc
          port: 8000
