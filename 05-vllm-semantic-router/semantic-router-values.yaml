# 1. Keep your persistence for the 20Gi models
persistence:
  enabled: true
  storageClassName: local-path
  size: 20Gi

# 1. Provide a writable scratch space (this stays the same)
extraVolumes:
  - name: config-writable-space
    emptyDir: {}

# 2. THE FIX: Mount the FILE, not the DIR
extraVolumeMounts:
  - name: config-writable-space
    mountPath: /app/config/router-runtime.json # Exact file path
    subPath: router-runtime.json # Key trick: targets the file only

config:
  version: v0.3

  # 1. CRITICAL FIX: Link local models to the internal family names
  # This fixes the "TraditionalModernBertClassifier not initialized" error
  embedding_models:
    mmbert_model_path: "models/mom-embedding-light"
    bert_model_path: "models/mom-embedding-light"
    use_cpu: true

  listeners: []
  providers:
    defaults:
      default_model: base-model
      reasoning_families:
        deepseek:
          type: chat_template_kwargs
          parameter: thinking
        qwen3:
          type: chat_template_kwargs
          parameter: enable_thinking
        gpt-oss:
          type: reasoning_effort
          parameter: reasoning_effort
        gpt:
          type: reasoning_effort
          parameter: reasoning_effort
      default_reasoning_effort: high
    models:
      - name: base-model
        reasoning_family: qwen3
        backend_refs:
          - name: local-vllm
            endpoint: inference-gateway-istio.gateway-system.svc.cluster.local:80
            weight: 1

  routing:
    decisions:
      - name: business_decision
        description: Business and management related queries
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: business
        modelRefs:
          - model: base-model
            lora_name: social-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a senior business consultant and strategic advisor. Provide practical, actionable business advice.
              mode: replace

      - name: law_decision
        description: Legal questions and law-related topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: law
        modelRefs:
          - model: base-model
            lora_name: law-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a knowledgeable legal expert. Provide accurate legal information and analysis.
              mode: replace

      - name: psychology_decision
        description: Psychology and mental health topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: psychology
        modelRefs:
          - model: base-model
            lora_name: humanities-expert
            use_reasoning: false
        plugins:
          - type: semantic-cache
            configuration:
              enabled: true
              similarity_threshold: 0.8

      - name: biology_decision
        description: Biology and life sciences questions
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: biology
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a biology expert. Explain biological concepts with scientific accuracy.
              mode: replace

      - name: chemistry_decision
        description: Chemistry and chemical sciences questions
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: chemistry
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a chemistry expert specializing in chemical reactions.
              mode: replace

      - name: history_decision
        description: Historical questions and cultural topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: history
        modelRefs:
          - model: base-model
            lora_name: humanities-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a historian. Provide accurate historical context and analysis.
              mode: replace

      - name: health_decision
        description: Health and medical information queries
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: health
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: semantic-cache
            configuration:
              enabled: true
              similarity_threshold: 0.8

      - name: economics_decision
        description: Economics and financial topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: economics
        modelRefs:
          - model: base-model
            lora_name: social-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are an economics expert. Analyze economic phenomena using established principles.
              mode: replace

      - name: math_decision
        description: Mathematics and quantitative reasoning
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: math
        modelRefs:
          - model: base-model
            lora_name: math-expert
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a mathematics expert. Provide step-by-step solutions.
              mode: replace

      - name: physics_decision
        description: Physics and physical sciences
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: physics
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a physics expert with deep understanding of physical laws.
              mode: replace

      - name: computer_science_decision
        description: Computer science and programming
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: computer science
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a computer science expert. Provide clear, practical solutions.
              mode: replace

      - name: philosophy_decision
        description: Philosophy and ethical questions
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: philosophy
        modelRefs:
          - model: base-model
            lora_name: humanities-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a philosophy expert. Engage with complex philosophical questions.
              mode: replace

      - name: engineering_decision
        description: Engineering and technical problem-solving
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: engineering
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are an engineering expert. Apply engineering principles to provide practical solutions.
              mode: replace

      - name: thinking_decision
        description: Complex reasoning and multi-step thinking
        priority: 20
        rules:
          operator: OR
          conditions:
            - type: keyword
              rule_name: thinking
        modelRefs:
          - model: base-model
            lora_name: general-expert
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a thinking expert. Please answer the question step by step.
              mode: replace

      - name: general_decision
        description: General knowledge and miscellaneous topics
        priority: 1
        rules:
          operator: OR
          conditions:
            - type: domain
              name: other
            # Forces the router to calculate embedding confidence for intents
            - type: classification
              name: confidence
              operator: GTE
              value: 0
        modelRefs:
          - model: base-model
            lora_name: general-expert
            use_reasoning: false
        plugins:
          - type: semantic-cache
            configuration:
              enabled: true
              similarity_threshold: 0.75

    signals:
      keywords:
        - category: thinking
          operator: OR
          keywords: [urgent, immediate, asap, think, careful]
          case_sensitive: false
      domains:
        - { name: business, description: "Business, finance, marketing" }
        - { name: law, description: "Legal principles, case law" }
        - { name: psychology, description: "Mental health, behavior" }
        - { name: biology, description: "Biology, life sciences" }
        - { name: chemistry, description: "Chemical reactions" }
        - { name: history, description: "Historical events" }
        - { name: health, description: "Medical information" }
        - { name: economics, description: "Macro and micro economics" }
        - { name: math, description: "Mathematics and logic" }
        - { name: physics, description: "Physical laws" }
        - { name: computer science, description: "Programming and CS" }
        - { name: philosophy, description: "Ethics and logic" }
        - { name: engineering, description: "Engineering principles" }
        - { name: other, description: "General knowledge" }

    modelCards:
      - name: base-model
        loras:
          - { name: science-expert }
          - { name: social-expert }
          - { name: math-expert }
          - { name: law-expert }
          - { name: humanities-expert }
          - { name: general-expert }
      - name: general-expert

  global:
    router:
      strategy: priority
    services:
      api:
        batch_classification:
          max_batch_size: 100
          max_concurrency: 8
      observability:
        tracing:
          enabled: false

    # 2. CRITICAL SYNC: Use 'mmbert' for all stores to match the initialized model
    stores:
      semantic_cache:
        enabled: true
        backend_type: memory
        similarity_threshold: 0.8
        max_entries: 1000
        ttl_seconds: 3600
        eviction_policy: fifo
        embedding_model: mmbert
      memory:
        embedding_model: mmbert
      vector_store:
        embedding_model: mmbert

    integrations:
      tools:
        enabled: true
        top_k: 3
        similarity_threshold: 0.2
        tools_db_path: config/tools_db.json
        fallback_to_empty: true
