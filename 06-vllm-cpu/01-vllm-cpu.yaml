apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-cpu
  namespace: vllm-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen3-cpu
  template:
    metadata:
      labels:
        app: vllm-qwen3-cpu
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai-cpu:latest
          imagePullPolicy: Always
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "Qwen/Qwen3-0.6B"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "2048"
            - "--disable-access-log-for-endpoints"
            - "/health,/metrics,/ping"
          env:
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "2"
            - name: VLLM_CPU_NUM_WORKERS
              value: "1"
            - name: VLLM_CPU_OMP_THREADS_BIND
              value: "all"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
