apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: gateway-system
spec:
  gatewayClassName: istio
  infrastructure:
    annotations:
      traffic.sidecar.istio.io/excludeOutboundPorts: "50051"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
